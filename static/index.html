<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Inventory</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Warehouse Inventory</h1>
        </header>
        <div class="toolbar">
            <button id="add-btn" class="btn btn-primary">+ New Record</button>
            <span id="record-count" class="record-count"></span>
        </div>

        <!-- Modal for Add/Edit -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modal-title">New Record</h2>
                    <button id="modal-close" class="modal-close">&times;</button>
                </div>
                <form id="record-form">
                    <input type="hidden" id="form-id">
                    <div class="form-group">
                        <label for="form-product-name">Product Name</label>
                        <input type="text" id="form-product-name" required>
                    </div>
                    <div class="form-group">
                        <label for="form-category">Category</label>
                        <input type="text" id="form-category" required>
                    </div>
                    <div class="form-group">
                        <label for="form-quantity">Quantity</label>
                        <input type="number" id="form-quantity" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="form-price">Price</label>
                        <input type="number" id="form-price" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="form-supplier">Supplier</label>
                        <input type="text" id="form-supplier">
                    </div>
                    <div class="form-actions">
                        <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete confirmation -->
        <div id="delete-overlay" class="modal-overlay hidden">
            <div class="modal modal-sm">
                <div class="modal-header">
                    <h2>Confirm Delete</h2>
                    <button id="delete-close" class="modal-close">&times;</button>
                </div>
                <p id="delete-message" class="delete-message">Are you sure you want to delete this record?</p>
                <div class="form-actions">
                    <button id="delete-cancel" class="btn btn-secondary">Cancel</button>
                    <button id="delete-confirm" class="btn btn-danger">Delete</button>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="inventory-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Supplier</th>
                        <th class="actions-col">Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                </tbody>
            </table>
            <div id="empty-state" class="empty-state hidden">No inventory records found.</div>
            <div id="loading" class="loading">Loading inventory...</div>
            <div id="error-state" class="error-state hidden"></div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
